<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP - Clan Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cinzel Decorative"', 'serif'],
            heading: ['Cinzel', 'serif'],
            body:    ['"IM Fell English"', 'serif'],
          },
        },
      },
    }
  </script>
  <style>
    .rank-1 { color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
    .gold-border { border: 1px solid rgba(201, 162, 39, 0.25); }
    .item-hover:hover { background: rgba(201, 162, 39, 0.08); transition: all 0.2s ease; }
    #lb-wrapper::-webkit-scrollbar { width: 4px; }
    #lb-wrapper::-webkit-scrollbar-thumb { background: #c9a227; border-radius: 10px; }
    .status-alive { color: #4ade80; font-weight: bold; }
    .status-window { color: #fbbf24; font-weight: bold; }
  </style>
</head>
<body class="bg-[#0d0d0f] text-[#d4c9b0] font-body min-h-screen">

  <header class="relative py-10 border-b border-[#3d3020] bg-black/40 text-center">
    <div class="max-w-7xl mx-auto px-4">
      <img src="images/animals.png" alt="Logo" class="h-24 w-auto mx-auto mb-4 object-contain drop-shadow-[0_0_15px_rgba(201,162,39,0.3)]">
      <h1 class="font-display text-4xl font-bold tracking-[0.1em] text-[#c9a227]">Animals CP</h1>
      <p class="font-heading text-[10px] tracking-[0.4em] uppercase text-[#6b6070] mt-1 mb-6">Elite Activity Tracker</p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-12 grid grid-cols-1 lg:grid-cols-4 gap-8">
    
    <div class="lg:col-span-2 space-y-4">
      <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase ml-2">Elite Rankings</h2>
      <div id="lb-wrapper" class="bg-[#12121a]/90 gold-border rounded-sm shadow-2xl overflow-y-auto max-h-[600px]">
        <div id="leaderboard" class="divide-y divide-[#3d3020]/20"></div>
      </div>
    </div>

    <div class="lg:col-span-2 space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-4">
          <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase ml-2">Epic Respawn Times</h2>
          <div class="bg-[#12121a]/90 gold-border rounded-sm overflow-hidden shadow-xl min-h-[100px]">
              <div id="boss-timers" class="p-3 space-y-2"></div>
          </div>
        </div>

        <div class="space-y-4">
          <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase ml-2">Acquisition Feed</h2>
          <div id="last-purchased" class="bg-[#12121a]/90 gold-border rounded-sm p-4 space-y-4 min-h-[200px] shadow-xl"></div>
        </div>
      </div>

      <div class="space-y-4">
        <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase ml-2">Epic Armory</h2>
        <div id="jewels-section" class="bg-[#12121a]/90 gold-border rounded-sm shadow-2xl overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-px bg-[#3d3020]/20"></div>
      </div>
    </div>
  </main>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6YT5pXR24ENKCgDZvYrbIUb54zmm9s5SHzeUQTVzxDty7c4mYAxXPbtJfSk-VaUWtaJQilFUR5W-t/pub?output=csv";

    // ΕΔΩ ΕΙΝΑΙ ΤΑ PATHS ΓΙΑ ΤΟΝ ΦΑΚΕΛΟ Images ΣΟΥ
    const CONFIG = {
      activities: {
        valakas: { label: "Valakas", jewelCost: 600, image: "images/necklace-valakas.png" },
        antharas: { label: "Antharas", jewelCost: 350, image: "images/earring-antharas.png" },
        baium: { label: "Baium", jewelCost: 300, image: "images/ring-of-baium.png" },
        frintezza: { label: "Frintezza", jewelCost: 120, image: "images/frintezza-necklace.png" },
        zaken: { label: "Zaken", jewelCost: 100, image: "images/zaken-earring.png" },
        antQueen: { label: "Ant Queen", jewelCost: 90, image: "images/ring-of-queen-ant.png" },
        orfen: { label: "Orfen", jewelCost: 40, image: "images/earring-orfen.png" },
        core: { label: "Core", jewelCost: 35, image: "images/ring-of-core.png" }
      }
    };

    let PLAYER_DATA = {};

    async function init() {
      try {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();
        const lines = csvText.split('\n').map(line => line.split(','));
        
        PLAYER_DATA = {};
        for (let i = 1; i < lines.length; i++) {
          const row = lines[i];
          if (!row[0] || i > 60) continue;
          const name = row[0].trim();
          PLAYER_DATA[name] = {
            points: parseFloat(row[1]) || 0,
            bought: {
              valakas: parseInt(row[11])||0, antharas: parseInt(row[12])||0, baium: parseInt(row[13])||0,
              frintezza: parseInt(row[14])||0, zaken: parseInt(row[15])||0, antQueen: parseInt(row[16])||0,
              orfen: parseInt(row[17])||0, core: parseInt(row[18])||0
            }
          };
        }

        // Boss Timers (T & U)
        let timersHTML = "";
        for (let j = 2; j <= 11; j++) {
            if(lines[j] && lines[j][19] && lines[j][19].trim() !== "") {
                const name = lines[j][19].trim();
                const time = lines[j][20] ? lines[j][20].trim() : "";
                const statusClass = time.includes('ALIVE') ? 'status-alive' : time.includes('WINDOW') ? 'status-window' : '';
                timersHTML += `<div class="flex justify-between p-2 border-b border-white/5 uppercase text-[10px]">
                    <span class="text-[#6b6070]">${name}</span><span class="gold-text ${statusClass}">${time}</span>
                </div>`;
            }
        }
        document.getElementById('boss-timers').innerHTML = timersHTML;

        renderLeaderboard();
        renderFeed();
        renderArmory();
      } catch (err) { console.error("Error loading CSV:", err); }
    }

    function renderLeaderboard() {
      const sorted = Object.entries(PLAYER_DATA).sort((a, b) => b[1].points - a[1].points);
      document.getElementById('leaderboard').innerHTML = sorted.map(([name, info], i) => `
        <div class="flex items-center justify-between p-4 item-hover">
          <div class="flex items-center gap-3">
            <span class="font-heading text-xs w-5 ${i<3?'rank-1':''}">#${i+1}</span>
            <span class="font-heading text-md uppercase font-bold ${i<3?'rank-1':''}">${name}</span>
          </div>
          <div class="font-display text-xl font-bold">${info.points}</div>
        </div>`).join('');
    }

    function renderFeed() {
      let feedHTML = "";
      Object.entries(PLAYER_DATA).forEach(([name, info]) => {
        Object.entries(info.bought).forEach(([j, count]) => {
          if (count > 0) feedHTML += `
            <div class="flex items-center gap-3 p-2 bg-black/40 border-l-2 border-[#c9a227]">
              <img src="${CONFIG.activities[j].image}" class="h-6 w-6 object-contain" onerror="this.style.display='none'">
              <span class="text-[10px] uppercase font-bold tracking-tighter">${name} acquired ${CONFIG.activities[j].label}</span>
            </div>`;
        });
      });
      document.getElementById('last-purchased').innerHTML = feedHTML || '<p class="text-[10px] text-center text-[#6b6070]">No recent updates</p>';
    }

    function renderArmory() {
      document.getElementById('jewels-section').innerHTML = 
        Object.entries(CONFIG.activities).map(([k,v]) => `
          <div class="flex items-center justify-between p-3 bg-[#12121a] text-[10px] uppercase item-hover">
            <div class="flex items-center gap-3">
              <img src="${v.image}" class="h-8 w-8 object-contain">
              <span class="text-[#6b6070] font-bold">${v.label}</span>
            </div>
            <span class="gold-text font-bold">${v.jewelCost} <span class="text-[8px]">PTS</span></span>
          </div>`).join('');
    }

    init();
    setInterval(init, 30000);
  </script>
</body>
</html>
