<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cinzel Decorative"', 'serif'],
            heading: ['Cinzel', 'serif'],
            body:    ['"IM Fell English"', 'serif'],
          },
          keyframes: {
            float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-6px)' } },
            'fade-up': { from: { opacity: '0', transform: 'translateY(16px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            'glow-pulse': { '0%, 100%': { filter: 'drop-shadow(0 0 5px rgba(201,162,39,0.3))' }, '50%': { filter: 'drop-shadow(0 0 15px rgba(201,162,39,0.6))' } },
            'row-in': { from: { opacity: '0', transform: 'translateX(-10px)' }, to: { opacity: '1', transform: 'translateX(0)' } }
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            'fade-up': 'fade-up 0.8s ease both',
            'glow-pulse': 'glow-pulse 3s ease-in-out infinite',
            'row-in': 'row-in 0.4s ease both'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0d0d0f] text-[#d4c9b0] font-body min-h-screen overflow-x-hidden">
  <div class="pointer-events-none fixed inset-0 z-0 bg-[radial-gradient(ellipse_at_center,transparent_40%,rgba(0,0,0,0.75)_100%)]"></div>

  <header class="relative z-10 py-10 px-8 border-b border-[#3d3020] bg-gradient-to-b from-[#c9a227]/[0.04] to-transparent">
    <div class="flex flex-col items-center gap-4">
      <img src="images/animals.png" alt="Animals CP logo" class="h-36 w-auto animate-float [filter:drop-shadow(0_0_12px_rgba(201,162,39,0.4))]">
      <div class="text-center">
        <h1 class="font-display text-4xl md:text-5xl font-bold tracking-[0.1em] text-[#c9a227] [text-shadow:0_0_20px_rgba(201,162,39,0.3)]">Animals CP</h1>
        <p class="font-heading text-xs tracking-[0.3em] uppercase text-[#6b6070] mt-2">Activity Tracker &mdash; Elite Rankings</p>
      </div>
    </div>
    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 bg-[#0d0d0f] border border-[#3d3020] p-1 rotate-45">
        <div class="w-2 h-2 bg-[#c9a227]"></div>
    </div>
  </header>

  <main class="relative z-10 max-w-2xl mx-auto px-4 py-12 animate-fade-up">
    <div id="leaderboard" class="bg-[#12121a] border border-[#3d3020] rounded shadow-2xl relative overflow-hidden">
        </div>
  </main>

  <section class="relative z-10 max-w-2xl mx-auto px-4 pb-12">
    <h2 class="font-heading text-center text-[#c9a227] text-sm tracking-widest mb-6 uppercase">Epic Armory</h2>
    <div id="jewels-section" class="grid grid-cols-1 gap-4"></div>
  </section>

  <footer class="relative z-10 text-center py-8 px-6 border-t border-[#1e1a26]">
    <span class="block text-[#8a6d1a] text-xs opacity-40 mb-2">◆ &nbsp; ◆ &nbsp; ◆</span>
    <p class="font-heading text-xs tracking-wider text-[#6b6070]">Animals CP &copy; 2024 &mdash; Forged in Battle</p>
  </footer>

  <script>
    (function () {
      var v = Date.now();
      var d = document.createElement('script'); d.src = 'data.js?v=' + v;
      d.onload = function () {
        var s = document.createElement('script'); s.src = 'script.js?v=' + v;
        document.body.appendChild(s);
      };
      document.body.appendChild(d);
    })();
  </script>
</body>
</html>
