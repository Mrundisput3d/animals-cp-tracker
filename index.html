<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP - Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cinzel Decorative"', 'serif'],
            heading: ['Cinzel', 'serif'],
            body:    ['"IM Fell English"', 'serif'],
          },
          keyframes: {
            float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-6px)' } },
            'fade-up': { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            'row-in': { from: { opacity: '0', transform: 'translateX(-10px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            'stardust': { '0%': { transform: 'translateY(0)' }, '100%': { transform: 'translateY(-1000px)' } }
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            'fade-up': 'fade-up 1s ease-out both',
            'row-in': 'row-in 0.5s ease-out both',
            'stardust': 'stardust 100s linear infinite'
          }
        }
      }
    }
  </script>
  <style>
    .jewel-glow { filter: drop-shadow(0 0 8px rgba(201, 162, 39, 0.4)); transition: all 0.3s; }
    .jewel-glow:hover { filter: drop-shadow(0 0 15px rgba(201, 162, 39, 0.8)); transform: scale(1.1); }
  </style>
</head>
<body class="bg-[#0d0d0f] text-[#d4c9b0] font-body min-h-screen overflow-x-hidden relative">

  <div class="fixed inset-0 z-0 pointer-events-none opacity-30">
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] animate-stardust"></div>
  </div>

  <div class="pointer-events-none fixed inset-0 z-1 bg-[radial-gradient(ellipse_at_center,transparent_30%,rgba(0,0,0,0.8)_100%)]"></div>

  <header class="relative z-10 py-12 border-b border-[#3d3020] bg-gradient-to-b from-[#c9a227]/10 to-transparent">
    <div class="flex flex-col items-center gap-4">
      <img src="images/animals.png" alt="Logo" class="h-32 w-auto animate-float drop-shadow-[0_0_15px_rgba(201,162,39,0.3)]">
      <div class="text-center">
        <h1 class="font-display text-4xl md:text-6xl text-[#c9a227] tracking-tighter [text-shadow:2px_2px_0_rgba(0,0,0,0.8)]">Animals CP</h1>
        <p class="font-heading text-[10px] tracking-[0.4em] uppercase text-[#6b6070] mt-2">Activity Tracker & Ranking System</p>
      </div>
    </div>
  </header>

  <main class="relative z-10 max-w-2xl mx-auto px-4 py-12 animate-fade-up">
    <div id="leaderboard" class="bg-[#12121a]/90 border border-[#3d3020] rounded shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <p class="text-center py-12 font-heading text-xs tracking-[0.2em] uppercase text-[#6b6070]">Loading rankings…</p>
    </div>
  </main>

  <section class="relative z-10 max-w-2xl mx-auto px-4 pb-20 animate-fade-up" style="animation-delay: 0.3s">
    <h2 class="font-heading text-center text-[#c9a227] text-sm tracking-[0.3em] mb-8 uppercase opacity-60">Epic Armory</h2>
    <div id="jewels-section" class="grid grid-cols-1 gap-3"></div>
  </section>

  <script>
    // ΕΔΩ ΕΙΝΑΙ ΤΑ ΔΕΔΟΜΕΝΑ ΣΟΥ
    window.L2_DATA = {
      config: {
        activities: {
          siege:           { label: "Castle Siege",      points: 9 },
          valakas:         { label: "Valakas",           points: 9,    jewelCost: 600,  image: "images/necklace-valakas.png"  },
          antharas:        { label: "Antharas",          points: 9,    jewelCost: 350,  image: "images/earring-antharas.png"  },
          baium:           { label: "Baium",             points: 9,    jewelCost: 300,  image: "images/ring-of-baium.png"     },
          frintezza:       { label: "Frintezza",         points: 4.5,  jewelCost: 120,  image: "images/frintezza-necklace.png"},
          zaken:           { label: "Zaken",             points: 2.25, jewelCost: 100,  image: "images/zaken-earring.png"     },
          antQueen:        { label: "Ant Queen",         points: 2.25, jewelCost: 90,   image: "images/ring-of-queen-ant.png" },
          orfen:           { label: "Orfen",             points: 2.25, jewelCost: 40,   image: "images/earring-orfen.png"     },
          core:            { label: "Core",              points: 2.25, jewelCost: 35,   image: "images/ring-of-core.png"      },
          newPlayerBonus:  { label: "New Player Bonus",  points: 50,   image: "images/bonus-icon.png" }
        }
      },
      players: {
        "Mrundisput3d": { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 3, zaken: 6, antQueen: 9, orfen: 5, core: 4, baium: 3, newPlayerBonus: 0 }, bought: { zaken: 1 } },
        "Dreamcatcher": { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 4, zaken: 3, antQueen: 7, orfen: 4, core: 2, baium: 3, newPlayerBonus: 0 }, bought: { } },
        "MONARXIDOS":   { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 2, zaken: 3, antQueen: 5, orfen: 4, core: 2, baium: 3, newPlayerBonus: 0 }, bought: { zaken: 1 } },
        "AgainstALL":   { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 6, zaken: 3, antQueen: 5, orfen: 0, core: 1, baium: 2, newPlayerBonus: 0 }, bought: { } },
        "HOLLISTER":    { activities: { siege: 1, valakas: 2, antharas: 0, frintezza: 2, zaken: 3, antQueen: 4, orfen: 4, core: 2, baium: 3, newPlayerBonus: 0 }, bought: { } },
        "Fidempor12":   { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 1, zaken: 4, antQueen: 2, orfen: 3, core: 1, baium: 3, newPlayerBonus: 0 }, bought: { } },
        "IiSusHristos": { activities: { siege: 2, valakas: 2, antharas: 0, frintezza: 2, zaken: 3, antQueen: 2, orfen: 3, core: 1, baium: 2, newPlayerBonus: 0 }, bought: { } },
        "GRP":          { activities: { siege: 2, valakas: 2, antharas: 0, frintezza: 0, zaken: 2, antQueen: 2, orfen: 1, core: 0, baium: 2, newPlayerBonus: 0 }, bought: { } },
        "Sammy":        { activities: { siege: 1, valakas: 0, antharas: 0, frintezza: 0, zaken: 0, antQueen: 0, orfen: 2, core: 0, baium: 0, newPlayerBonus: 1 }, bought: { } },
        "Psolemporas":  { activities: { siege: 1, valakas: 0, antharas: 0, frintezza: 0, zaken: 0, antQueen: 0, orfen: 0, core: 1, baium: 1, newPlayerBonus: 1 }, bought: { } },
        "Area51XxX":    { activities: { siege: 1, valakas: 1, antharas: 0, frintezza: 0, zaken: 3, antQueen: 2, orfen: 1, core: 0, baium: 1, newPlayerBonus: 0 }, bought: { } },
        "Lpan":         { activities: { siege: 1, valakas: 1, antharas: 0, frintezza: 0, zaken: 1, antQueen: 0, orfen: 2, core: 1, baium: 1, newPlayerBonus: 0 }, bought: { } },
        "SunnyLeone":   { activities: { siege: 0, valakas: 0, antharas: 0, frintezza: 0, zaken: 0, antQueen: 0, orfen: 0, core: 0, baium: 0, newPlayerBonus: 0 }, bought: { } }
      }
    };

    // ΕΔΩ ΕΙΝΑΙ Ο ΚΩΔΙΚΑΣ ΕΜΦΑΝΙΣΗΣ
    document.addEventListener('DOMContentLoaded', () => {
        const data = window.L2_DATA;
        const leaderboard = document.getElementById('leaderboard');
        const jewelsSection = document.getElementById('jewels-section');

        function calculatePoints(player) {
            let total = 0;
            for (let act in player.activities) {
                if (data.config.activities[act]) {
                    total += player.activities[act] * data.config.activities[act].points;
                }
            }
            for (let item in player.bought) {
                if (data.config.activities[item]) {
                    total -= player.bought[item] * data.config.activities[item].jewelCost;
                }
            }
            return total.toFixed(1);
        }

        const sortedPlayers = Object.entries(data.players)
            .map(([name, info]) => ({ name, points: parseFloat(calculatePoints(info)), ...info }))
            .sort((a, b) => b.points - a.points);

        leaderboard.innerHTML = sortedPlayers.map((player, index) => {
            const rankClass = index === 0 ? 'text-[#c9a227] font-bold' : index === 1 ? 'text-[#a0a0a0]' : index === 2 ? 'text-[#8a6d1a]' : 'text-[#6b6070]';
            const isNew = player.activities.newPlayerBonus > 0;
            const bonusIcon = data.config.activities.newPlayerBonus.image;

            return `
                <div class="flex items-center justify-between p-5 border-b border-[#3d3020]/20 hover:bg-[#c9a227]/5 transition-all">
                    <div class="flex items-center gap-5">
                        <span class="font-heading text-xl ${rankClass} w-8">#${index + 1}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-heading text-lg tracking-wider ${index < 3 ? 'text-[#d4c9b0]' : 'text-[#8a8a8a]'}">${player.name}</span>
                            ${isNew ? `<img src="${bonusIcon}" class="h-5 w-5 animate-pulse" title="New Player Bonus">` : ''}
                        </div>
                    </div>
                    <div class="font-display text-[#c9a227] text-xl">${player.points} <span class="text-[10px] uppercase font-heading text-[#6b6070]">pts</span></div>
                </div>
            `;
        }).join('');

        jewelsSection.innerHTML = Object.entries(data.config.activities)
            .filter(([key, val]) => val.jewelCost)
            .map(([key, item]) => `
                <div class="flex items-center justify-between bg-[#12121a] p-4 border border-[#3d3020] rounded hover:border-[#c9a227]/40 transition-all group">
                    <div class="flex items-center gap-4">
                        <img src="${item.image}" class="h-10 w-10 jewel-glow" alt="${item.label}">
                        <span class="font-heading text-xs tracking-[0.2em] uppercase text-[#d4c9b0]">${item.label}</span>
                    </div>
                    <div class="text-right">
                        <div class="font-body italic text-[#c9a227] text-md">${item.jewelCost}</div>
                    </div>
                </div>
            `).join('');
    });
  </script>
</body>
</html>
