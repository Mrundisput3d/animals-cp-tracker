<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP - Clan Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0d0d0f; color: #d4c9b0; font-family: 'IM Fell English', serif; }
    .gold-text { color: #c9a227; font-family: 'Cinzel', serif; }
    .gold-border { border: 1px solid rgba(201, 162, 39, 0.3); }
    .panel-bg { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
    .rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
  </style>
</head>
<body class="p-4 md:p-8">

  <header class="text-center mb-10">
    <img src="images/animals.png" alt="Animals Logo" class="h-32 mx-auto mb-4 object-contain" onerror="this.src='https://img.icons8.com/ios-filled/100/c9a227/shield.png'">
    <h1 class="text-4xl font-bold gold-text tracking-tighter uppercase">Animals CP</h1>
    <div class="mt-4 inline-block px-6 py-2 border gold-border panel-bg">
        <p class="text-[10px] uppercase tracking-widest text-gray-500">Next Objective</p>
        <div id="countdown" class="text-2xl gold-text font-bold uppercase tracking-widest">Loading...</div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
    
    <div class="lg:col-span-2">
      <h2 class="gold-text text-sm mb-4 uppercase tracking-widest">Elite Rankings</h2>
      <div class="panel-bg gold-border rounded overflow-hidden shadow-2xl">
        <div id="leaderboard" class="divide-y divide-white/5"></div>
      </div>
    </div>

    <div class="lg:col-span-2 space-y-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <h2 class="gold-text text-sm mb-4 uppercase tracking-widest">Respawn Times</h2>
          <div id="timers" class="panel-bg gold-border p-3 text-xs space-y-2"></div>
        </div>
        <div>
          <h2 class="gold-text text-sm mb-4 uppercase tracking-widest">Acquisition Feed</h2>
          <div id="feed" class="panel-bg gold-border p-3 text-[10px] space-y-2 min-h-[100px]"></div>
        </div>
      </div>

      <div>
        <h2 class="gold-text text-sm mb-4 uppercase tracking-widest text-center">Epic Armory</h2>
        <div id="armory" class="grid grid-cols-2 gap-2"></div>
      </div>
    </div>
  </main>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6YT5pXR24ENKCgDZvYrbIUb54zmm9s5SHzeUQTVzxDty7c4mYAxXPbtJfSk-VaUWtaJQilFUR5W-t/pub?output=csv";

    const ITEMS = [
        { name: "Valakas", cost: 600, img: "images/necklace-valakas.png", col: 11 },
        { name: "Antharas", cost: 350, img: "images/earring-antharas.png", col: 12 },
        { name: "Baium", cost: 300, img: "images/ring-of-baium.png", col: 13 },
        { name: "Zaken", cost: 100, img: "images/zaken-earring.png", col: 14 }
    ];

    let bossData = [];

    async function fetchData() {
        try {
            const r = await fetch(SHEET_URL);
            const data = await r.text();
            const rows = data.split('\n').map(row => row.split(','));

            // 1. LEADERBOARD
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = rows.slice(1, 40).filter(r => r[0]).map((r, i) => `
                <div class="flex justify-between p-4 items-center hover:bg-white/5">
                    <span class="gold-text ${i<3?'rank-1':''}">#${i+1} ${r[0]}</span>
                    <span class="text-xl font-bold">${r[1] || 0}</span>
                </div>
            `).join('');

            // 2. BOSS TIMERS (Col T, U)
            bossData = [];
            let timersHTML = "";
            for(let i=2; i<=11; i++) {
                if(rows[i] && rows[i][19]) {
                    const name = rows[i][19].trim();
                    const time = rows[i][20] ? rows[i][20].trim() : "TBD";
                    bossData.push({ name, time });
                    timersHTML += `<div class="flex justify-between border-b border-white/5 pb-1">
                        <span class="text-gray-500 uppercase">${name}</span>
                        <span class="gold-text">${time}</span>
                    </div>`;
                }
            }
            document.getElementById('timers').innerHTML = timersHTML;

            // 3. FEED (Check columns L, M, N)
            let feedHTML = "";
            rows.slice(1, 30).forEach(r => {
                if(r[11] > 0) feedHTML += `<div class="border-l-2 border-yellow-600 pl-2 bg-white/5 p-1">${r[0]} acquired Valakas</div>`;
                if(r[12] > 0) feedHTML += `<div class="border-l-2 border-yellow-600 pl-2 bg-white/5 p-1">${r[0]} acquired Antharas</div>`;
            });
            document.getElementById('feed').innerHTML = feedHTML || "No recent activity";

            // 4. ARMORY
            document.getElementById('armory').innerHTML = ITEMS.map(item => `
                <div class="panel-bg gold-border p-2 flex items-center justify-between">
                    <img src="${item.img}" class="w-6 h-6 object-contain" onerror="this.style.display='none'">
                    <span class="text-[10px] uppercase">${item.name}</span>
                    <span class="gold-text text-[10px]">${item.cost}</span>
                </div>
            `).join('');

        } catch (e) { console.error("Sheet Error:", e); }
    }

    function updateCountdown() {
        const now = new Date();
        let next = null;
        let min = Infinity;

        bossData.forEach(b => {
            try {
                const parts = b.time.split(' ');
                if(parts.length < 2) return;
                const [d, m] = parts[0].split('/');
                const [hh, mm] = parts[1].split(':');
                const target = new Date(now.getFullYear(), m-1, d, hh, mm);
                const diff = target - now;
                if(diff > 0 && diff < min) { min = diff; next = { name: b.name, diff }; }
            } catch(e) {}
        });

        const el = document.getElementById('countdown');
        if(next) {
            const h = Math.floor(next.diff / 3600000);
            const m = Math.floor((next.diff % 3600000) / 60000);
            const s = Math.floor((next.diff % 60000) / 1000);
            el.innerText = `${next.name}: ${h}h ${m}m ${s}s`;
        } else { el.innerText = "Check Excel Times"; }
    }

    fetchData();
    setInterval(fetchData, 60000);
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
