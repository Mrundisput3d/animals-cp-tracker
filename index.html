<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP - Clan Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cinzel Decorative"', 'serif'],
            heading: ['Cinzel', 'serif'],
            body:    ['"IM Fell English"', 'serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* Smoke Effect - Background Only */
    .smoke-bg {
        position: fixed; inset: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 0; opacity: 0.2; overflow: hidden;
    }
    .smoke-layer {
        position: absolute; bottom: 0; left: 0; width: 200%; height: 100%;
        background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
        animation: smokeMove 60s linear infinite;
    }
    @keyframes smokeMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .gold-border { border: 1px solid rgba(201, 162, 39, 0.3); }
    .item-hover:hover { background: rgba(201, 162, 39, 0.1); transition: 0.3s; }
    .rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    #lb-wrapper::-webkit-scrollbar { width: 4px; }
    #lb-wrapper::-webkit-scrollbar-thumb { background: #c9a227; }
  </style>
</head>
<body class="bg-[#0d0d0f] text-[#d4c9b0] font-body min-h-screen selection:bg-[#c9a227] selection:text-black">

  <div class="smoke-bg"><div class="smoke-layer"></div></div>

  <header class="relative z-10 py-8 border-b border-[#3d3020] bg-black/60 text-center">
    <h1 class="font-display text-4xl font-bold tracking-[0.1em] text-[#c9a227]">Animals CP</h1>
    <p class="font-heading text-[10px] tracking-[0.4em] uppercase text-[#6b6070] mt-1 mb-4">Elite Activity Tracker</p>
    
    <div id="next-event-banner" class="inline-block px-8 py-3 bg-black/80 border border-[#c9a227]/50 rounded-sm shadow-[0_0_20px_rgba(0,0,0,0.5)]">
        <p class="font-heading text-[10px] tracking-[0.2em] uppercase text-[#c9a227]/70 mb-1">Next Objective In:</p>
        <div id="countdown-timer" class="font-display text-2xl text-white tracking-widest uppercase">Loading...</div>
    </div>

    <div class="mt-6">
        <a href="https://discord.gg/uj5DgeCeJS" target="_blank" class="px-6 py-2 border border-[#5865F2] text-[#5865F2] font-heading text-[11px] tracking-widest uppercase hover:bg-[#5865F2] hover:text-white transition-all">Join Discord</a>
    </div>
  </header>

  <main class="relative z-10 max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
    
    <div class="lg:col-span-2 space-y-4">
      <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase">Elite Rankings</h2>
      <div id="lb-wrapper" class="bg-black/60 gold-border rounded-sm overflow-y-auto max-h-[600px] shadow-2xl">
        <div id="leaderboard" class="divide-y divide-white/5"></div>
      </div>
    </div>

    <div class="lg:col-span-2 space-y-8">
      
      <div class="space-y-4">
        <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase">Epic Respawn Times (GMT+2)</h2>
        <div class="bg-black/60 gold-border rounded-sm p-2 shadow-xl">
            <div id="boss-timers" class="space-y-1"></div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-4">
            <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase text-center">Epic Armory</h2>
            <div id="jewels-section" class="bg-black/60 gold-border rounded-sm divide-y divide-white/5 shadow-xl"></div>
          </div>

          <div class="bg-black/60 gold-border p-5 rounded-sm shadow-xl">
            <h3 class="font-heading text-[#c9a227] text-[11px] border-b border-white/10 mb-3 pb-1 uppercase">Rules of Honor</h3>
            <ul class="text-[11px] text-[#6b6070] space-y-2 uppercase italic">
                <li>✦ Baium: Saturday 22:00</li>
                <li>✦ Siege: Sunday 20:00</li>
                <li>✦ New Players: <span class="text-[#c9a227] not-italic font-bold">+50 PTS</span></li>
            </ul>
          </div>
      </div>
    </div>
  </main>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6YT5pXR24ENKCgDZvYrbIUb54zmm9s5SHzeUQTVzxDty7c4mYAxXPbtJfSk-VaUWtaJQilFUR5W-t/pub?output=csv";

    const CONFIG = {
      activities: {
        siege: { label: "Siege", points: 9, img: "images/siege-icon.png" },
        valakas: { label: "Valakas", points: 9, jewelCost: 600, img: "images/necklace-valakas.png" },
        antharas: { label: "Antharas", points: 9, jewelCost: 350, img: "images/earring-antharas.png" },
        baium: { label: "Baium", points: 9, jewelCost: 300, img: "images/ring-of-baium.png" },
        frintezza: { label: "Frintezza", points: 4.5, jewelCost: 120, img: "images/frintezza-necklace.png" },
        zaken: { label: "Zaken", points: 2.25, jewelCost: 100, img: "images/zaken-earring.png" },
        antQueen: { label: "Ant Queen", points: 2.25, jewelCost: 90, img: "images/ring-of-queen-ant.png" },
        orfen: { label: "Orfen", points: 2.25, jewelCost: 40, img: "images/earring-orfen.png" },
        core: { label: "Core", points: 2.25, jewelCost: 35, img: "images/ring-of-core.png" }
      }
    };

    let PLAYER_DATA = {};
    let BOSS_DATA = [];

    async function init() {
      try {
        const response = await fetch(SHEET_URL);
        const csv = await response.text();
        const rows = csv.split('\n').map(r => r.split(','));

        // Parse Leaderboard
        PLAYER_DATA = {};
        rows.slice(1, 50).forEach(row => {
          if(!row[0]) return;
          PLAYER_DATA[row[0]] = { points: row[1] || 0 };
        });

        // Parse Bosses (T3-T11)
        BOSS_DATA = [];
        for(let i=2; i<=10; i++) {
          if(rows[i] && rows[i][19]) {
            BOSS_DATA.push({ name: rows[i][19].trim(), timeStr: rows[i][20].trim() });
          }
        }
        
        render();
        startCountdown();
      } catch (e) { console.error(e); }
    }

    function render() {
      // Leaderboard
      const sorted = Object.entries(PLAYER_DATA).sort((a,b) => b[1].points - a[1].points);
      document.getElementById('leaderboard').innerHTML = sorted.map(([name, data], i) => `
        <div class="flex justify-between items-center p-4 item-hover">
          <div class="flex items-center gap-3">
            <span class="font-heading text-xs w-6 ${i<3?'rank-1':''}">#${i+1}</span>
            <span class="font-heading text-lg uppercase ${i<3?'rank-1':''}">${name}</span>
          </div>
          <span class="font-display text-xl text-[#f3eacb]">${data.points}</span>
        </div>
      `).join('');

      // Boss Timers
      document.getElementById('boss-timers').innerHTML = BOSS_DATA.map(b => `
        <div class="flex justify-between p-2 text-[11px] font-heading uppercase border-b border-white/5">
          <span class="text-[#6b6070]">${b.name}</span>
          <span class="text-[#c9a227]">${b.timeStr}</span>
        </div>
      `).join('');

      // Epic Armory WITH ICONS
      document.getElementById('jewels-section').innerHTML = Object.entries(CONFIG.activities)
        .filter(([key, val]) => val.jewelCost)
        .map(([key, val]) => `
          <div class="flex items-center justify-between p-3 item-hover">
            <div class="flex items-center gap-3">
                <img src="${val.img}" class="w-8 h-8 object-contain drop-shadow-md" onerror="this.src='https://via.placeholder.com/32'">
                <span class="font-heading text-[10px] uppercase text-[#6b6070]">${val.label}</span>
            </div>
            <span class="font-display text-sm text-[#c9a227]">${val.jewelCost} PTS</span>
          </div>
        `).join('');
    }

    function startCountdown() {
      setInterval(() => {
        const now = new Date();
        let next = null;
        let minDiff = Infinity;

        BOSS_DATA.forEach(b => {
          const parts = b.timeStr.split(' ');
          if(parts.length < 2) return;
          const [d, m] = parts[0].split('/');
          const [hh, mm] = parts[1].split(':');
          const eventDate = new Date(now.getFullYear(), m-1, d, hh, mm);
          
          const diff = eventDate - now;
          if(diff > 0 && diff < minDiff) {
            minDiff = diff;
            next = { name: b.name, diff: diff };
          }
        });

        const el = document.getElementById('countdown-timer');
        if(next) {
          const h = Math.floor(next.diff / 3600000);
          const m = Math.floor((next.diff % 3600000) / 60000);
          const s = Math.floor((next.diff % 60000) / 1000);
          el.innerText = `${next.name}: ${h}h ${m}m ${s}s`;
          el.classList.add('text-white');
        } else {
          el.innerText = "NO UPCOMING EVENTS";
          el.classList.add('text-[#6b6070]');
        }
      }, 1000);
    }

    init();
  </script>
</body>
</html>
