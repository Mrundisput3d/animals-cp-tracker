<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP - Clan Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cinzel Decorative"', 'serif'],
            heading: ['Cinzel', 'serif'],
            body:    ['"IM Fell English"', 'serif'],
          },
        },
      },
    }
  </script>
  <style>
    .smoke-bg { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.15; overflow: hidden; }
    .smoke-layer { position: absolute; bottom: 0; left: 0; width: 200%; height: 100%; background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); animation: smokeMove 60s linear infinite; }
    @keyframes smokeMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .gold-border { border: 1px solid rgba(201, 162, 39, 0.3); }
    .item-hover:hover { background: rgba(201, 162, 39, 0.1); transition: 0.3s; }
    .rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    #lb-wrapper::-webkit-scrollbar { width: 4px; }
    #lb-wrapper::-webkit-scrollbar-thumb { background: #c9a227; }
  </style>
</head>
<body class="bg-[#0d0d0f] text-[#d4c9b0] font-body min-h-screen">

  <div class="smoke-bg"><div class="smoke-layer"></div></div>

  <header class="relative z-10 py-6 border-b border-[#3d3020] bg-black/60 text-center">
    <img src="https://i.postimg.cc/mD8mXz3K/animals-logo.png" alt="Animals Logo" class="h-24 mx-auto mb-2 drop-shadow-[0_0_15px_rgba(201,162,39,0.4)]" onerror="this.src='images/animals.png'">
    <h1 class="font-display text-3xl font-bold tracking-[0.1em] text-[#c9a227]">Animals CP</h1>
    
    <div id="next-event-banner" class="mt-4 inline-block px-8 py-3 bg-black/80 border border-[#c9a227]/50 rounded-sm">
        <p class="font-heading text-[10px] tracking-[0.2em] uppercase text-[#c9a227]/70 mb-1">Next Objective In:</p>
        <div id="countdown-timer" class="font-display text-2xl text-white tracking-widest uppercase">Loading...</div>
    </div>
  </header>

  <main class="relative z-10 max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
    
    <div class="lg:col-span-2 space-y-4">
      <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase ml-1">Elite Rankings</h2>
      <div id="lb-wrapper" class="bg-black/60 gold-border rounded-sm overflow-y-auto max-h-[600px] shadow-2xl">
        <div id="leaderboard" class="divide-y divide-white/5"></div>
      </div>
    </div>

    <div class="lg:col-span-2 space-y-8">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-4">
            <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase ml-1">Respawn Times</h2>
            <div id="boss-timers" class="bg-black/60 gold-border rounded-sm p-2 text-[11px] min-h-[120px] divide-y divide-white/5"></div>
          </div>
          <div class="space-y-4">
            <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase ml-1">Acquisition Feed</h2>
            <div id="acquisition-feed" class="bg-black/60 gold-border rounded-sm p-3 min-h-[120px] text-[10px] space-y-2 uppercase"></div>
          </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-4">
            <h2 class="font-heading text-[#c9a227] text-xs tracking-[0.3em] uppercase text-center">Epic Armory</h2>
            <div id="jewels-section" class="bg-black/60 gold-border rounded-sm divide-y divide-white/5 shadow-xl"></div>
          </div>
          <div class="bg-black/60 gold-border p-5 rounded-sm h-fit">
            <h3 class="font-heading text-[#c9a227] text-[11px] border-b border-white/10 mb-3 pb-1 uppercase font-bold">Rules of Honor</h3>
            <ul class="text-[11px] text-[#6b6070] space-y-2 uppercase italic">
                <li>✦ Points based on participation.</li>
                <li>✦ Epic costs auto-deducted.</li>
                <li>✦ New Players receive: <span class="text-[#c9a227] not-italic font-bold">+50 PTS</span></li>
            </ul>
          </div>
      </div>
    </div>
  </main>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6YT5pXR24ENKCgDZvYrbIUb54zmm9s5SHzeUQTVzxDty7c4mYAxXPbtJfSk-VaUWtaJQilFUR5W-t/pub?output=csv";

    const JEWELS = {
      valakas: { label: "Valakas", cost: 600, img: "images/necklace-valakas.png" },
      antharas: { label: "Antharas", cost: 350, img: "images/earring-antharas.png" },
      baium: { label: "Baium", cost: 300, img: "images/ring-of-baium.png" },
      frintezza: { label: "Frintezza", cost: 120, img: "images/frintezza-necklace.png" },
      zaken: { label: "Zaken", cost: 100, img: "images/zaken-earring.png" },
      antQueen: { label: "Ant Queen", cost: 90, img: "images/ring-of-queen-ant.png" },
      orfen: { label: "Orfen", cost: 40, img: "images/earring-orfen.png" },
      core: { label: "Core", cost: 35, img: "images/ring-of-core.png" }
    };

    let BOSS_DATA = [];

    async function init() {
      try {
        const resp = await fetch(SHEET_URL);
        const csv = await resp.text();
        const rows = csv.split('\n').map(r => r.split(','));

        // 1. Rankings (A & B)
        document.getElementById('leaderboard').innerHTML = rows.slice(1, 60).filter(r => r[0]).map((row, i) => `
          <div class="flex justify-between items-center p-4 item-hover">
            <div class="flex items-center gap-3">
              <span class="font-heading text-xs w-6 ${i<3?'rank-1':''}">#${i+1}</span>
              <span class="font-heading text-lg uppercase ${i<3?'rank-1':''}">${row[0]}</span>
            </div>
            <span class="font-display text-xl text-[#f3eacb] font-bold">${row[1] || 0}</span>
          </div>
        `).join('');

        // 2. Bosses (T & U) - Σωστή ανάγνωση από το spreadsheet
        BOSS_DATA = [];
        for(let i=2; i<=11; i++) {
          if(rows[i] && rows[i][19]) {
              BOSS_DATA.push({ name: rows[i][19].trim(), timeStr: rows[i][20] ? rows[i][20].trim() : "TBD" });
          }
        }

        // 3. Feed
        let feedHTML = "";
        rows.slice(1, 40).forEach(row => {
            if(row[11] > 0) feedHTML += `<div class="p-2 bg-white/5 border-l-2 border-[#c9a227] mb-1 font-heading text-[9px]">${row[0]} acquired Valakas</div>`;
            if(row[12] > 0) feedHTML += `<div class="p-2 bg-white/5 border-l-2 border-[#c9a227] mb-1 font-heading text-[9px]">${row[0]} acquired Antharas</div>`;
        });
        document.getElementById('acquisition-feed').innerHTML = feedHTML || '<p class="text-[#3d3020] italic">No updates</p>';

        renderStatic();
      } catch (e) { console.error(e); }
    }

    function renderStatic() {
      document.getElementById('boss-timers').innerHTML = BOSS_DATA.map(b => `
        <div class="flex justify-between p-2">
          <span class="text-[#6b6070] font-bold uppercase">${b.name}</span>
          <span class="text-[#c9a227]">${b.timeStr}</span>
        </div>`).join('');

      document.getElementById('jewels-section').innerHTML = Object.entries(JEWELS).map(([k, v]) => `
          <div class="flex items-center justify-between p-3 item-hover">
            <div class="flex items-center gap-3">
                <img src="${v.img}" class="w-8 h-8 object-contain" onerror="this.style.opacity='0.2'">
                <span class="font-heading text-[10px] text-[#6b6070] uppercase">${v.label}</span>
            </div>
            <span class="font-display text-sm text-[#c9a227]">${v.cost} PTS</span>
          </div>`).join('');
    }

    function startCountdown() {
      setInterval(() => {
        const now = new Date();
        let next = null;
        let minDiff = Infinity;

        BOSS_DATA.forEach(b => {
          try {
            if(b.timeStr.includes("WINDOW") || b.timeStr === "TBD") return;
            const [datePart, timePart] = b.timeStr.split(' ');
            const [d, m] = datePart.split('/');
            const [hh, mm] = timePart.split(':');
            const evDate = new Date(now.getFullYear(), m-1, d, hh, mm);
            const diff = evDate - now;
            if(diff > 0 && diff < minDiff) { minDiff = diff; next = { name: b.name, diff: diff }; }
          } catch(e) {}
        });

        const el = document.getElementById('countdown-timer');
        if(next) {
          const h = Math.floor(next.diff / 3600000);
          const m = Math.floor((next.diff % 3600000) / 60000);
          const s = Math.floor((next.diff % 60000) / 1000);
          el.innerText = `${next.name}: ${h}h ${m}m ${s}s`;
        } else { el.innerText = "WAITING DATA"; }
      }, 1000);
    }

    init();
    startCountdown();
    setInterval(init, 60000);
  </script>
</body>
</html>
