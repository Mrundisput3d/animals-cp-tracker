<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals CP - Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English&display=swap" rel="stylesheet">
    <style>
        /* Smoke Background Effect */
        .smoke-container { position: fixed; inset: 0; z-index: -1; background: #08080a; overflow: hidden; }
        .smoke-layer { 
            position: absolute; inset: -50%; width: 200%; height: 200%; 
            background: radial-gradient(circle at center, rgba(40,40,55,0.2) 0%, transparent 60%); 
            filter: blur(40px); animation: smoke-move 30s ease-in-out infinite; 
        }
        @keyframes smoke-move { 
            0%, 100% { transform: translate(0, 0) scale(1); } 
            50% { transform: translate(-2%, -2%) scale(1.1); } 
        }
        
        .gold-border { border: 1px solid rgba(201, 162, 39, 0.4); }
        .rank-1 { color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); font-size: 1.2em; }
        .rank-2 { color: #e0e0e0; text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 12px rgba(205, 127, 50, 0.4); }
        
        .item-hover:hover { background: rgba(201, 162, 39, 0.1); transition: 0.3s; }
    </style>
</head>
<body class="text-[#d4c9b0] font-serif bg-[#08080a] min-h-screen">

    <div class="smoke-container"><div class="smoke-layer"></div></div>

    <header class="py-10 text-center border-b border-[#3d3020] bg-black/60 backdrop-blur-md">
        <h1 class="text-4xl md:text-5xl font-bold text-[#c9a227] tracking-[0.2em] uppercase transition-all" style="font-family: 'Cinzel', serif;">Animals CP</h1>
        <p class="text-xs tracking-[0.4em] text-[#6b6070] mt-3 font-bold uppercase">Elite Activity Tracker</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#c9a227] mb-4"></div>
            <p class="text-[#c9a227] animate-pulse uppercase tracking-widest text-sm">Συγχρονισμός με Command Center...</p>
        </div>
        
        <div id="content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-[#c9a227] text-xs tracking-widest uppercase font-bold ml-2">Elite Rankings</h2>
                <div id="leaderboard" class="bg-[#12121a]/90 gold-border rounded-sm shadow-2xl backdrop-blur-md overflow-hidden">
                    </div>
            </div>

            <div class="lg:col-span-1 space-y-8">
                <div class="bg-[#12121a]/90 gold-border p-6 shadow-2xl backdrop-blur-md rounded-sm">
                    <h2 class="text-[#c9a227] text-sm tracking-widest uppercase mb-6 border-b border-[#3d3020] pb-3 text-center font-bold" style="font-family: 'Cinzel', serif;">System Rules</h2>
                    <ul class="space-y-5 text-sm leading-relaxed">
                        <li class="flex items-start"><span class="text-[#c9a227] mr-3 font-bold">◆</span> Points earned through participation in Clan Activities.</li>
                        <li class="flex items-start"><span class="text-[#c9a227] mr-3 font-bold">◆</span> Epic Jewel purchases deduct the corresponding points.</li>
                        <li class="flex items-start"><span class="text-[#c9a227] mr-3 font-bold">◆</span> New Players: <span class="text-[#c9a227] font-bold">+50 PTS</span> Starter Bonus.</li>
                    </ul>
                </div>
                
                <div class="text-center opacity-40 text-[10px] uppercase tracking-[3px]">
                    Last Refreshed: <span id="last-update">-</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Ο ΣΥΝΔΕΣΜΟΣ ΣΟΥ
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6YT5pXR24ENKCgDZvYrbIUb54zmm9s5SHzeUQTVzxDty7c4mYAxXPbtJfSk-VaUWtaJQilFUR5W-t/pub?output=csv';

        // ΡΥΘΜΙΣΕΙΣ ΠΟΝΤΩΝ
        const CONFIG = {
            activities: {
                siege: 9, valakas: 9, antharas: 9, baium: 9, frintezza: 4.5, zaken: 2.25, antQueen: 2.25, orfen: 2.25, core: 2.25, newPlayerBonus: 50
            },
            costs: {
                valakas: 600, antharas: 350, baium: 300, frintezza: 120, zaken: 100, antQueen: 90, orfen: 40, core: 35
            }
        };

        async function fetchData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Network error');
                const csvText = await response.text();
                processData(csvText);
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerHTML = `<p class="text-red-500">Σφάλμα σύνδεσης. Βεβαιωθείτε ότι το Sheet είναι "Published to Web" ως CSV.</p>`;
            }
        }

        function processData(csv) {
            // Χωρισμός γραμμών και αφαίρεση κεφαλίδας
            const rows = csv.split('\n').map(row => row.split(',')).slice(1);
            let players = [];

            rows.forEach(col => {
                if (col.length < 11 || !col[0]) return;

                const name = col[0].trim();
                
                // Υπολογισμός Θετικών Πόντων
                let points = 
                    (parseFloat(col[1]) || 0) * CONFIG.activities.siege +
                    (parseFloat(col[2]) || 0) * CONFIG.activities.valakas +
                    (parseFloat(col[3]) || 0) * CONFIG.activities.antharas +
                    (parseFloat(col[4]) || 0) * CONFIG.activities.baium +
                    (parseFloat(col[5]) || 0) * CONFIG.activities.frintezza +
                    (parseFloat(col[6]) || 0) * CONFIG.activities.zaken +
                    (parseFloat(col[7]) || 0) * CONFIG.activities.antQueen +
                    (parseFloat(col[8]) || 0) * CONFIG.activities.orfen +
                    (parseFloat(col[9]) || 0) * CONFIG.activities.core +
                    (parseFloat(col[10]) || 0) * CONFIG.activities.newPlayerBonus;

                // Αφαίρεση Αγορών (Στήλη L / 11)
                const boughtRaw = col[11] ? col[11].trim() : "";
                if (boughtRaw) {
                    const purchases = boughtRaw.split('|');
                    purchases.forEach(p => {
                        const [item, qty] = p.trim().split(':');
                        const key = item ? item.toLowerCase().trim() : '';
                        if (CONFIG.costs[key]) {
                            points -= (parseInt(qty) || 0) * CONFIG.costs[key];
                        }
                    });
                }

                players.push({ name, total: parseFloat(points.toFixed(1)) });
            });

            // Ταξινόμηση και Εμφάνιση
            renderLeaderboard(players.sort((a, b) => b.total - a.total));
        }

        function renderLeaderboard(data) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = data.map((p, i) => {
                const rankStyle = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                const crown = i === 0 ? '👑' : '';
                
                return `
                <div class="flex items-center justify-between p-6 border-b border-[#3d3020]/30 item-hover">
                    <div class="flex items-center gap-5">
                        <span class="font-bold text-lg w-8 ${rankStyle}">#${i + 1}</span>
                        <div>
                            <span class="text-2xl font-bold uppercase tracking-widest ${rankStyle}">${crown} ${p.name}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-4xl font-black text-[#f3eacb] drop-shadow-md">${p.total}</span>
                        <span class="text-[10px] text-[#c9a227] font-bold block tracking-tighter uppercase">Points</span>
                    </div>
                </div>`;
            }).join('');
        }

        // Αυτόματη ανανέωση κάθε 5 λεπτά
        document.addEventListener('DOMContentLoaded', fetchData);
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
