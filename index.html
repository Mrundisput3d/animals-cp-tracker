<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP - Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cinzel Decorative"', 'serif'],
            heading: ['Cinzel', 'serif'],
            body:    ['"IM Fell English"', 'serif'],
          },
          animation: {
            'smoke-move': 'smokeMove 40s linear infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            smokeMove: { '0%': { transform: 'scale(1) translate(0, 0)' }, '50%': { transform: 'scale(1.2) translate(-2%, -2%)' }, '100%': { transform: 'scale(1) translate(0, 0)' } },
            float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-10px)' } },
          }
        },
      },
    }
  </script>
  <style>
    /* Smoke & Fog Layers */
    .bg-dark { background: #050507; position: fixed; inset: 0; z-index: -2; }
    .smoke-layer {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(40,40,50,0.15) 0%, transparent 70%),
                  url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
      opacity: 0.3; filter: blur(60px); z-index: -1;
      animation: smoke-move 40s ease-in-out infinite;
    }
    .rank-1 { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.6); }
    .gold-border { border: 1px solid rgba(201, 162, 39, 0.3); }
    .item-hover:hover { background: rgba(201, 162, 39, 0.1); transition: 0.3s; }
  </style>
</head>
<body class="text-[#d4c9b0] font-body min-h-screen">

  <div class="bg-dark"></div>
  <div class="smoke-layer"></div>

  <header class="relative z-10 py-12 text-center border-b border-[#3d3020]/40 bg-black/40 backdrop-blur-sm">
    <img src="images/animals.png" alt="Logo" class="h-32 mx-auto mb-4 animate-float drop-shadow-[0_0_20px_rgba(201,162,39,0.5)]">
    <h1 class="font-display text-5xl text-[#c9a227] tracking-widest uppercase">Animals CP</h1>
    <p class="font-heading text-[10px] tracking-[0.5em] text-[#6b6070] mt-2 italic">Elite Activity Tracking System</p>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-12 relative z-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <div class="lg:col-span-2">
      <h2 class="font-heading text-xs tracking-widest text-[#c9a227] uppercase mb-4 ml-2">Current Standings</h2>
      <div id="leaderboard" class="bg-[#12121a]/90 gold-border rounded-sm shadow-2xl overflow-hidden"></div>
    </div>

    <div class="space-y-8">
      <div>
        <h2 class="font-heading text-xs tracking-widest text-[#c9a227] uppercase mb-4 ml-2">Recent Acquisitions</h2>
        <div id="last-purchased" class="bg-[#12121a]/90 gold-border rounded-sm p-4 space-y-4 shadow-xl"></div>
      </div>
      
      <div class="bg-[#12121a]/90 gold-border p-6 rounded-sm shadow-xl">
        <h2 class="font-heading text-xs tracking-widest text-[#c9a227] uppercase mb-4 border-b border-[#3d3020] pb-2 text-center">System Rules</h2>
        <ul class="text-xs space-y-3 opacity-70 font-sans tracking-wide">
          <li class="flex items-start"><span class="text-[#c9a227] mr-2">✦</span> Points awarded for Boss Kills & Sieges.</li>
          <li class="flex items-start"><span class="text-[#c9a227] mr-2">✦</span> Epic Jewel purchases deduct points instantly.</li>
          <li class="flex items-start"><span class="text-[#c9a227] mr-2">✦</span> New members start with +50 PTS bonus.</li>
        </ul>
      </div>
    </div>

    <div class="lg:col-span-3">
       <h2 class="font-heading text-xs tracking-widest text-[#c9a227] uppercase mb-4 ml-2">Epic Armory Pricing</h2>
       <div id="jewels-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>
  </main>

  <div id="modal-overlay" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-md flex items-center justify-center p-4">
    <div id="modal-content" class="bg-[#12121a] border border-[#c9a227]/40 w-full max-w-md shadow-[0_0_60px_rgba(0,0,0,1)]"></div>
  </div>

  <script>
    const L2_DATA = {
      config: {
        activities: {
          siege: { label: "Castle Siege", points: 9 },
          valakas: { label: "Valakas", points: 9, jewelCost: 600, image: "images/necklace-valakas.png" },
          antharas: { label: "Antharas", points: 9, jewelCost: 350, image: "images/earring-antharas.png" },
          baium: { label: "Baium", points: 9, jewelCost: 300, image: "images/ring-of-baium.png" },
          frintezza: { label: "Frintezza", points: 4.5, jewelCost: 120, image: "images/frintezza-necklace.png" },
          zaken: { label: "Zaken", points: 2.25, jewelCost: 100, image: "images/zaken-earring.png" },
          antQueen: { label: "Ant Queen", points: 2.25, jewelCost: 90, image: "images/ring-of-queen-ant.png" },
          orfen: { label: "Orfen", points: 2.25, jewelCost: 40, image: "images/earring-orfen.png" },
          core: { label: "Core", points: 2.25, jewelCost: 35, image: "images/ring-of-core.png" },
          newPlayerBonus: { label: "New Player Bonus", points: 50, image: "images/bonus-icon.png" }
        }
      },
      players: {
        "Mrundisput3d": { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 4, zaken: 7, antQueen: 9, orfen: 5, core: 4, baium: 3, newPlayerBonus: 0 }, bought: { zaken: 1 } },
        "Dreamcatcher3": { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 5, zaken: 4, antQueen: 7, orfen: 4, core: 2, baium: 3, newPlayerBonus: 0 }, bought: { } },
        "Fidempor12":   { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 2, zaken: 5, antQueen: 2, orfen: 3, core: 1, baium: 3, newPlayerBonus: 0 }, bought: { } },
        "MONARXIDOS":   { activities: { siege: 3, valakas: 2, antharas: 1, frintezza: 2, zaken: 3, antQueen: 5, orfen: 4, core: 2, baium: 3, newPlayerBonus: 0 }, bought: { zaken: 1 } }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const calc = (p) => {
        let t = 0;
        for (let a in p.activities) if (L2_DATA.config.activities[a]) t += p.activities[a] * L2_DATA.config.activities[a].points;
        for (let b in p.bought) if (L2_DATA.config.activities[b]) t -= p.bought[b] * L2_DATA.config.activities[b].jewelCost;
        return t.toFixed(1);
      };

      // Leaderboard
      const sorted = Object.entries(L2_DATA.players).map(([name, info]) => ({ name, points: parseFloat(calc(info)), ...info })).sort((a,b) => b.points - a.points);
      document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => `
        <div class="flex items-center justify-between p-6 border-b border-[#3d3020]/40 item-hover cursor-pointer" onclick="openModal('${p.name}')">
          <div class="flex items-center gap-5">
            <span class="font-heading text-xl w-6 ${i===0?'rank-1':''}">${i+1}</span>
            <span class="font-heading text-2xl tracking-wide ${i===0?'rank-1':''}">${i===0?'👑 ':''}${p.name}</span>
          </div>
          <div class="font-display text-3xl text-[#f3eacb] font-bold">${p.points} <span class="text-[10px] text-[#c9a227] tracking-tighter">PTS</span></div>
        </div>`).join('');

      // Last Purchased
      const allPurchases = [];
      Object.entries(L2_DATA.players).forEach(([name, info]) => Object.entries(info.bought).forEach(([j, c]) => { if(c>0) allPurchases.push({name, jewel: L2_DATA.config.activities[j]}); }));
      document.getElementById('last-purchased').innerHTML = allPurchases.slice(-3).reverse().map(p => `
        <div class="flex items-center gap-3 p-3 bg-black/40 rounded border border-white/5">
          <img src="${p.jewel.image}" class="h-10 w-10 object-contain">
          <div class="text-[10px] uppercase">
            <div class="text-[#c9a227] font-bold text-sm font-heading">${p.name}</div>
            <div class="text-[#6b6070]">Acquired ${p.jewel.label}</div>
          </div>
        </div>`).join('');

      // Armory
      document.getElementById('jewels-section').innerHTML = Object.entries(L2_DATA.config.activities).filter(([k,v]) => v.jewelCost).map(([k,v]) => `
        <div class="bg-[#12121a]/80 p-5 gold-border rounded flex items-center justify-between shadow-lg hover:border-[#c9a227]/60 transition">
          <img src="${v.image}" class="h-12 w-12 object-contain drop-shadow-[0_0_5px_rgba(201,162,39,0.3)]">
          <div class="text-right">
            <div class="text-[10px] text-[#6b6070] uppercase font-bold tracking-widest">${v.label}</div>
            <div class="text-[#c9a227] font-display text-2xl">${v.jewelCost}</div>
          </div>
        </div>`).join('');

      window.openModal = (name) => {
        const p = L2_DATA.players[name];
        document.getElementById('modal-content').innerHTML = `
          <div class="p-6 border-b border-[#3d3020] flex justify-between items-center bg-gradient-to-r from-[#c9a227]/20 to-transparent">
            <h3 class="font-display text-2xl text-[#f3eacb] uppercase tracking-widest">${name}</h3>
            <button onclick="closeModal()" class="text-[#c9a227] text-3xl hover:text-white transition">✕</button>
          </div>
          <div class="p-8 space-y-4 max-h-[50vh] overflow-y-auto">
            ${Object.entries(p.activities).filter(([k,v]) => v > 0).map(([k,v]) => `
              <div class="flex justify-between items-center text-sm border-b border-[#3d3020]/20 pb-2">
                <span class="uppercase tracking-widest text-[#6b6070]">${L2_DATA.config.activities[k].label} (x${v})</span>
                <span class="text-[#f3eacb] font-bold font-display">+${(v * L2_DATA.config.activities[k].points).toFixed(1)}</span>
              </div>`).join('')}
          </div>
          <div class="p-8 bg-black/60 text-right border-t border-[#c9a227]/30">
            <div class="text-[#c9a227] font-display text-5xl">${calc(p)} <span class="text-xs">PTS</span></div>
          </div>`;
        document.getElementById('modal-overlay').classList.remove('hidden');
      };
      window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
    });
  </script>
</body>
</html>
