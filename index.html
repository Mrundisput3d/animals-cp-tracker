<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>ANIMALS CP - ELITE TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #d4c9b0; font-family: 'Cinzel', serif; }
        .gold-border { border: 1px solid #c9a227; }
        .gold-text { color: #c9a227; }
        .panel { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(201, 162, 39, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="text-center mb-12">
        <img src="https://i.ibb.co/m5Yh4Zq/animals-logo.png" alt="ANIMALS LOGO" class="h-32 mx-auto mb-4 drop-shadow-2xl">
        <h1 class="text-5xl font-bold tracking-widest gold-text">ANIMALS CP</h1>
        <div class="mt-6 inline-block px-10 py-4 panel gold-border">
            <p class="text-xs uppercase tracking-tighter opacity-50">Next Objective In:</p>
            <div id="next-boss" class="text-3xl font-bold uppercase tracking-widest mt-1">LOADING DATA...</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <h2 class="gold-text mb-4 text-center tracking-widest uppercase">Elite Rankings</h2>
            <div id="rankings" class="panel p-2 divide-y divide-white/5 max-h-[600px] overflow-y-auto"></div>
        </div>

        <div class="lg:col-span-1">
            <h2 class="gold-text mb-4 text-center tracking-widest uppercase">Respawn Times</h2>
            <div id="timers" class="panel p-4 space-y-3"></div>
        </div>

        <div class="lg:col-span-1 space-y-8">
            <div>
                <h2 class="gold-text mb-4 text-center tracking-widest uppercase">Epic Armory</h2>
                <div id="armory" class="grid grid-cols-1 gap-2"></div>
            </div>
            <div>
                <h2 class="gold-text mb-4 text-center tracking-widest uppercase">Acquisition Feed</h2>
                <div id="feed" class="panel p-4 text-[10px] min-h-[100px] uppercase"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6YT5pXR24ENKCgDZvYrbIUb54zmm9s5SHzeUQTVzxDty7c4mYAxXPbtJfSk-VaUWtaJQilFUR5W-t/pub?output=csv";

        async function update() {
            try {
                const response = await fetch(SHEET_URL);
                const csv = await response.text();
                const rows = csv.split('\n').map(r => r.split(','));

                // 1. RANKINGS
                document.getElementById('rankings').innerHTML = rows.slice(1, 41).filter(r => r[0]).map((r, i) => `
                    <div class="flex justify-between p-3 items-center">
                        <span class="text-sm">#${i+1} ${r[0]}</span>
                        <span class="gold-text font-bold text-lg">${r[1] || 0}</span>
                    </div>
                `).join('');

                // 2. BOSSES & NEXT OBJECTIVE
                let bosses = [];
                let timersHTML = "";
                const now = new Date();
                let nextBoss = null;
                let minDiff = Infinity;

                for(let i=2; i<=11; i++) {
                    if(rows[i] && rows[i][19]) {
                        const name = rows[i][19].trim();
                        const timeStr = rows[i][20] ? rows[i][20].trim() : "TBD";
                        timersHTML += `<div class="flex justify-between border-b border-white/5 pb-2">
                            <span class="opacity-70 uppercase text-xs">${name}</span>
                            <span class="gold-text text-xs">${timeStr}</span>
                        </div>`;

                        // Countdown Logic
                        const parts = timeStr.split(' ');
                        if(parts.length === 2) {
                            const [d, m] = parts[0].split('/');
                            const [hh, mm] = parts[1].split(':');
                            const target = new Date(now.getFullYear(), m-1, d, hh, mm);
                            const diff = target - now;
                            if(diff > 0 && diff < minDiff) { minDiff = diff; nextBoss = { name, diff }; }
                        }
                    }
                }
                document.getElementById('timers').innerHTML = timersHTML;
                
                // Update Countdown Display
                if(nextBoss) {
                    const h = Math.floor(nextBoss.diff / 3600000);
                    const m = Math.floor((nextBoss.diff % 3600000) / 60000);
                    const s = Math.floor((nextBoss.diff % 60000) / 1000);
                    document.getElementById('next-boss').innerText = `${nextBoss.name}: ${h}H ${m}M ${s}S`;
                }

                // 3. ARMORY & FEED (Hardcoded icons for stability)
                const items = [
                    {n: "VALAKAS", c: 600, img: "https://l2wiki.com/images/8/8e/Item_6657.png"},
                    {n: "ANTHARAS", c: 350, img: "https://l2wiki.com/images/3/36/Item_6658.png"},
                    {n: "BAIUM", c: 300, img: "https://l2wiki.com/images/a/a3/Item_6659.png"},
                    {n: "ZAKEN", c: 100, img: "https://l2wiki.com/images/1/12/Item_6662.png"}
                ];
                document.getElementById('armory').innerHTML = items.map(it => `
                    <div class="panel p-2 flex items-center justify-between">
                        <img src="${it.img}" class="w-6 h-6">
                        <span class="text-[10px]">${it.n}</span>
                        <span class="gold-text font-bold">${it.c} PTS</span>
                    </div>
                `).join('');

            } catch (e) { console.error("Update failed"); }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
