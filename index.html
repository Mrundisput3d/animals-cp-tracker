<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animals CP</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cinzel Decorative"', 'serif'],
            heading: ['Cinzel', 'serif'],
            body:    ['"IM Fell English"', 'serif'],
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%':       { transform: 'translateY(-6px)' },
            },
            'fade-up': {
              from: { opacity: '0', transform: 'translateY(16px)' },
              to:   { opacity: '1', transform: 'translateY(0)' },
            },
            'row-in': {
              from: { opacity: '0', transform: 'translateX(-8px)' },
              to:   { opacity: '1', transform: 'translateX(0)' },
            },
            'ornament-pulse': {
              '0%, 100%': { opacity: '0.35' },
              '50%':       { opacity: '0.8' },
            },
            'modal-in': {
              from: { opacity: '0', transform: 'scale(0.95) translateY(8px)' },
              to:   { opacity: '1', transform: 'scale(1) translateY(0)' },
            },
          },
          animation: {
            float:            'float 6s ease-in-out infinite',
            'fade-up':        'fade-up 0.8s ease both',
            'row-in':         'row-in 0.35s ease both',
            'ornament-pulse': 'ornament-pulse 4s ease-in-out infinite',
            'modal-in':       'modal-in 0.2s ease both',
          },
        },
      },
    }
  </script>
</head>
<body class="bg-[#0d0d0f] text-[#d4c9b0] font-body min-h-screen overflow-x-hidden">

  <!-- Vignette -->
  <div class="pointer-events-none fixed inset-0 z-0 bg-[radial-gradient(ellipse_at_center,transparent_40%,rgba(0,0,0,0.75)_100%)]"></div>

  <!-- Header -->
  <header class="relative z-10 py-10 px-8 border-b border-[#3d3020] bg-gradient-to-b from-[#c9a227]/[0.04] to-transparent">
    <div class="flex flex-col items-center gap-4">
      <img src="images/animals.png" alt="Animals CP logo"
           class="h-36 w-auto object-contain rounded-xl animate-float [filter:drop-shadow(0_0_12px_rgba(201,162,39,0.5))]">
      <div class="text-center">
        <h1 class="font-display text-4xl md:text-5xl font-bold tracking-[0.1em] text-[#c9a227] leading-none
                   [text-shadow:0_0_30px_rgba(201,162,39,0.5),0_0_60px_rgba(201,162,39,0.2),2px_2px_0_rgba(0,0,0,0.8)]">
          Animals CP
        </h1>
        <p class="font-heading text-xs tracking-[0.3em] uppercase text-[#6b6070] mt-1.5">
          Activity Tracker &mdash; Season Rankings
        </p>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 py-12 animate-fade-up">
    <div id="leaderboard"
         class="bg-[#12121a] border border-[#3d3020] rounded-sm overflow-hidden
                shadow-[0_20px_60px_rgba(0,0,0,0.7),inset_0_1px_0_rgba(201,162,39,0.08)]">
      <p class="text-center py-12 font-heading text-xs tracking-[0.2em] uppercase text-[#6b6070] animate-ornament-pulse">
        Loading rankings…
      </p>
    </div>
  </main>

  <!-- Epic Jewels -->
  <section class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 pb-12">
    <div id="jewels-section"
         class="bg-[#12121a] border border-[#3d3020] rounded-sm overflow-hidden
                shadow-[0_20px_60px_rgba(0,0,0,0.7),inset_0_1px_0_rgba(201,162,39,0.08)]">
    </div>
  </section>

  <!-- Footer -->
  <footer class="relative z-10 text-center py-8 px-6 border-t border-[#1e1a26]">
    <span class="block text-[#8a6d1a] text-xs opacity-40 mb-2">◆ &nbsp; ◆ &nbsp; ◆</span>
    <p class="font-heading text-xs tracking-wider text-[#6b6070]">
      Data sourced from
      <code class="font-mono text-[#8a6d1a] bg-[#c9a227]/[0.06] px-1.5 py-0.5 rounded border border-[#c9a227]/10">data.js</code>
      &mdash; edit to update rankings
    </p>
  </footer>

  <script>
    (function () {
      var v = Date.now();
      var d = document.createElement('script');
      d.src = 'data.js?v=' + v;
      d.onload = function () {
        var s = document.createElement('script');
        s.src = 'script.js?v=' + v;
        document.body.appendChild(s);
      };
      document.body.appendChild(d);
    })();
  </script>
</body>
</html>
